services:
  db:
    image: postgres:16-alpine
    container_name: finora-db
    environment:
      POSTGRES_USER: finora
      POSTGRES_PASSWORD: finora123
      POSTGRES_DB: finora
    ports:
      - "5432:5432"
    volumes:
      - finora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finora -d finora"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finora-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://finora:finora123@db:5432/finora
      JWT_SECRET: change-this-secret-in-production
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finora-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  finora_pgdata:
